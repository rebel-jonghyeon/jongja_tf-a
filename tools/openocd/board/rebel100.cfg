#
# OpenOCD Board Configuration for Rebellions_ REBEL_Q EVB
#

echo "\nRebellions_ Rebel100:\n"

set CFG_PATH [info script]
set CFG_PATH [file dirname $CFG_PATH]

source [find $CFG_PATH/../interface/jlink.cfg]

#
# Configure JTAG
#
adapter speed 10000
adapter srst delay 200
transport select jtag

#
# Configure Reset
#
jtag_ntrst_delay 100
reset_config trst_and_srst srst_pulls_trst srst_gates_jtag connect_assert_srst

#
# Configure Target
#
source [find $CFG_PATH/../target/rebel100_clx.cfg]
