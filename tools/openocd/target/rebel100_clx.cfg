#
# OpenOCD Target Configuration for Rebellions_ REBEL_Q
#

#
# Configure default for target
#
set _CHIPNAME		REBEL_Q
set _CL_MAX			4
set _CORE_MAX		4

set _CL				0

# Chiplet DAP index array
set _DAP_CL_IDX_ARR {1 3 2 0}

set _CPUTAPID	0x4BA06477

set _AP_APB		0x00004000
set _AP_AXI		0x00002000

# Configure JTAG TAPs for each chiplet that connected with daisy chain
set _DAP() 0
for { set _i 0 } { $_i < $_CL_MAX } { incr _i } {

	set _CL_IDX [lindex $_DAP_CL_IDX_ARR $_i]

	# Create JTAG TAPs
	jtag newtap $_CHIPNAME CL${_CL_IDX}.tap -irlen 4 -ircapture 0x1 -irmask 0x3 -expected-id $_CPUTAPID
	set _TAPNAME $_CHIPNAME.CL${_CL_IDX}.tap

	# Create JTAG DAPs
	set _DAPNAME $_CHIPNAME.CL${_CL_IDX}.dap
	set _DAP($_CL_IDX) $_DAPNAME
	dap create $_DAPNAME -chain-position $_TAPNAME -adiv6
}

# APB
target create $_CHIPNAME.apb mem_ap -endian little -dap $_DAP($_CL) -ap-num $_AP_APB
# AXI
target create $_CHIPNAME.axi mem_ap -endian little -dap $_DAP($_CL) -ap-num $_AP_AXI

# DBG base address
set _CP0_DBG_BASE {0x00810000 0x00910000 0x00A10000 0x00B10000}
set _CP1_DBG_BASE {0x01010000 0x01110000 0x01210000 0x01310000}

# CTI base address 
set _CP0_CTI_BASE {0x00820000 0x00920000 0x00A20000 0x00B20000}
set _CP1_CTI_BASE {0x01020000 0x01120000 0x01220000 0x01320000}

set _SMP_TARGETS ""
set TARGET() 0
set _IDX 0

proc setup_aarch64_core {CL CP_IDX CORE_NUM DBG_BASE CTI_BASE} {
	set CL_DAP $::_DAP($CL)
	for { set _i 0} { $_i < $CORE_NUM } { incr _i } {
		set _TARGET $::_CHIPNAME.CL${CL}.CP${CP_IDX}.Core${_i}
		set ::TARGET($::_IDX) $_TARGET

		# Create CTI for each core
		set _CTINAME $_TARGET.cti
		cti create $_CTINAME -dap $CL_DAP -ap-num $::_AP_APB -baseaddr [lindex $CTI_BASE $_i]

		# Create Target
		set _COMMAND "target create $_TARGET aarch64 -endian little -dap $CL_DAP -ap-num $::_AP_APB -dbgbase [lindex $DBG_BASE $_i] -cti $_CTINAME -coreid $_i"

		if { $_i != 0 } {
			set _COMMAND "$_COMMAND -defer-examine"
		}

		set ::_SMP_TARGETS "$::_SMP_TARGETS $_TARGET"
		puts $_COMMAND
		eval $_COMMAND

		incr ::_IDX
	}
}

# Cores for CP0
setup_aarch64_core 0 0 $_CORE_MAX $_CP0_DBG_BASE $_CP0_CTI_BASE
setup_aarch64_core 1 0 $_CORE_MAX $_CP0_DBG_BASE $_CP0_CTI_BASE
setup_aarch64_core 2 0 $_CORE_MAX $_CP0_DBG_BASE $_CP0_CTI_BASE
setup_aarch64_core 3 0 $_CORE_MAX $_CP0_DBG_BASE $_CP0_CTI_BASE

# Enable SMP
#if { $_CORE_MAX > 1 } {
#	eval "target smp $_SMP_TARGETS"
#}

targets $TARGET(0)
