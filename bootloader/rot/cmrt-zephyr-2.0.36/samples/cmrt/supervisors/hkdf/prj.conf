CONFIG_CMRT_WDT=y
CONFIG_TASK_WDT_MIN_TIMEOUT=5000
CONFIG_TASK_WDT_HW_FALLBACK_DELAY=500
CONFIG_CMRT_AES=n
CONFIG_CMRT_CC=n
CONFIG_CMRT_HC=y
CONFIG_CMRT_KDC=y
CONFIG_CMRT_KTC=n
CONFIG_CMRT_PKE=n
CONFIG_MULTITHREADING=y
