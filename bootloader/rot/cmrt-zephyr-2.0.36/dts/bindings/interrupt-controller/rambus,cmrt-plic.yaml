description: CMRT RISC-V platform-local interrupt controller

compatible: "rambus,cmrt-plic"

include: [interrupt-controller.yaml, base.yaml]

properties:
  reg:
      required: true

  "#interrupt-cells":
      const: 1

interrupt-cells:
  - irq
